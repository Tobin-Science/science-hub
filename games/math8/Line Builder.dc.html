<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./react.production.min.js"></script><script src="./react-dom.production.min.js"></script><script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;}
    @keyframes bannerin{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
    input[type=range]{-webkit-appearance:none;appearance:none;height:18px;border-radius:999px;background:#D6F7EE;border:3px solid #10463A;outline:none;}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:36px;height:36px;border-radius:50%;background:#18C29C;border:3px solid #10463A;cursor:grab;box-shadow:2px 2px 0 #10463A;}
    input[type=range]::-moz-range-thumb{width:36px;height:36px;border-radius:50%;background:#18C29C;border:3px solid #10463A;cursor:grab;}
  </style>
</helmet>
<div style="min-height:100vh;background:#E9FBF5;background-image:radial-gradient(#C4F0E2 2px,transparent 2px);background-size:32px 32px;font-family:Nunito,sans-serif;color:#10463A;padding:22px 24px 60px;">
  <div style="max-width:940px;margin:0 auto;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <a href="Grade 8 Arcade Hub.dc.html" style="text-decoration:none;font-family:Fredoka,sans-serif;font-weight:600;font-size:15px;color:#10463A;background:#fff;border:3px solid #10463A;border-radius:999px;padding:8px 16px;box-shadow:3px 3px 0 #10463A;">&larr; Arcade</a>
      <div style="display:flex;gap:10px;">
        <div style="background:#fff;border:3px solid #10463A;border-radius:14px;padding:6px 14px;box-shadow:3px 3px 0 #10463A;text-align:center;min-width:78px;">
          <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:#5C8C7E;">SCORE</div>
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:22px;line-height:1;">{{ score }}</div>
        </div>
        <div style="background:#FFD23F;border:3px solid #10463A;border-radius:14px;padding:6px 14px;box-shadow:3px 3px 0 #10463A;text-align:center;min-width:78px;">
          <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:#8A6D00;">STREAK</div>
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:22px;line-height:1;">{{ streak }}🔥</div>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:8px;">
      <span style="font-family:Fredoka,sans-serif;font-weight:600;font-size:13px;background:#18C29C;color:#fff;border:2px solid #10463A;border-radius:999px;padding:4px 12px;">8.PAR.4 &middot; Line Builder</span>
    </div>

    <div style="display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center;background:#fff;border:3px solid #10463A;border-radius:22px;box-shadow:6px 6px 0 #10463A;padding:22px;">
      <svg viewBox="0 0 360 360" width="360" style="display:block;flex:none;max-width:46vw;">
        <sc-for list="{{ grid }}" as="l" hint-placeholder-count="42">
          <line x1="{{ l.x1 }}" y1="{{ l.y1 }}" x2="{{ l.x2 }}" y2="{{ l.y2 }}" stroke="{{ l.col }}" stroke-width="{{ l.w }}"></line>
        </sc-for>
        <line x1="{{ lineX1 }}" y1="{{ lineY1 }}" x2="{{ lineX2 }}" y2="{{ lineY2 }}" stroke="{{ lineCol }}" stroke-width="6" stroke-linecap="round"></line>
        <sc-for list="{{ points }}" as="p" hint-placeholder-count="2">
          <circle cx="{{ p.cx }}" cy="{{ p.cy }}" r="9" fill="{{ p.fill }}" stroke="#10463A" stroke-width="3"></circle>
        </sc-for>
        <circle cx="{{ bX }}" cy="{{ bY }}" r="5" fill="#FFD23F" stroke="#10463A" stroke-width="2"></circle>
      </svg>

      <div>
        <h2 style="font-family:Fredoka,sans-serif;font-weight:700;font-size:24px;margin:0 0 4px;">Run the line through both dots</h2>
        <p style="font-weight:700;color:#5C8C7E;margin:0 0 16px;font-size:15px;">Set the slope (m) and the y-intercept (b).</p>

        <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:30px;text-align:center;background:#E9FBF5;border:3px solid #10463A;border-radius:14px;padding:10px;margin-bottom:18px;">y = <span style="color:#18C29C;">{{ mLabel }}</span>x {{ bSign }} <span style="color:#FF8A3D;">{{ bAbs }}</span></div>

        <div style="margin-bottom:16px;">
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:16px;margin-bottom:6px;">slope m = {{ mLabel }}</div>
          <input type="range" min="-6" max="6" step="1" value="{{ mHalf }}" onInput="{{ onM }}" style="width:100%;" />
        </div>
        <div>
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:16px;margin-bottom:6px;">y-intercept b = {{ b }}</div>
          <input type="range" min="-7" max="7" step="1" value="{{ b }}" onInput="{{ onB }}" style="width:100%;" />
        </div>

        <div style="margin-top:18px;min-height:52px;">
          <sc-if value="{{ won }}" hint-placeholder-val="{{ false }}">
            <div style="display:flex;align-items:center;gap:14px;animation:bannerin .35s ease both;">
              <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:18px;color:#10463A;background:#D6F7E2;border:3px solid #10463A;border-radius:12px;padding:10px 16px;box-shadow:3px 3px 0 #15803D;">Through both! ✓</div>
              <button onClick="{{ next }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:17px;background:#18C29C;color:#fff;border:3px solid #10463A;border-radius:12px;padding:10px 22px;box-shadow:3px 3px 0 #10463A;cursor:pointer;">Next &rarr;</button>
            </div>
          </sc-if>
          <sc-if value="{{ notWon }}" hint-placeholder-val="{{ true }}">
            <div style="font-weight:800;font-size:16px;color:#5C8C7E;">{{ hint }}</div>
          </sc-if>
        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.O=180; this.U=16; this.LIM=10;
    this.state={ score:0, streak:0, prob:this.makeProb(), mHalf:2, b:0, locked:false };
  }
  rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
  makeProb(){
    for(let i=0;i<200;i++){
      let mHalf=this.rnd(-6,6); if(mHalf===0) continue;
      const m=mHalf/2; const b=this.rnd(-5,5);
      // two lattice points
      const evens=[-8,-6,-4,-2,2,4,6,8];
      const xs=evens.sort(()=>Math.random()-0.5);
      const pts=[];
      for(const x of xs){ const y=m*x+b; if(Number.isInteger(y)&&Math.abs(y)<=9){ pts.push({x,y}); if(pts.length===2) break; } }
      if(pts.length===2) return { mHalf, b, m, pts };
    }
    return { mHalf:2, b:1, m:1, pts:[{x:-4,y:-3},{x:4,y:5}] };
  }
  onM=(e)=>{ if(this.state.locked) return; this.setState({mHalf:parseInt(e.target.value,10)}); };
  onB=(e)=>{ if(this.state.locked) return; this.setState({b:parseInt(e.target.value,10)}); };
  next=()=>{ this.setState({prob:this.makeProb(),mHalf:2,b:0,locked:false}); };
  toScreen(x,y){ return [ this.O+x*this.U, this.O-y*this.U ]; }
  renderVals(){
    const { prob, mHalf, b, score, streak, locked }=this.state;
    const m=mHalf/2;
    const won = mHalf===prob.mHalf && b===prob.b;
    if(won && !locked){ setTimeout(()=>{ this.setState(s=> s.locked?null:({locked:true,score:s.score+20,streak:s.streak+1})); },0); }
    const grid=[];
    for(let i=-this.LIM;i<=this.LIM;i++){
      const major=i===0;
      const [px]=this.toScreen(i,0);
      grid.push({ x1:px,y1:20,x2:px,y2:340, col:major?"#10463A":"#D6F0E8", w:major?2.5:1 });
      const [,py]=this.toScreen(0,i);
      grid.push({ x1:20,y1:py,x2:340,y2:py, col:major?"#10463A":"#D6F0E8", w:major?2.5:1 });
    }
    const [x1,y1]=this.toScreen(-10, m*-10+b);
    const [x2,y2]=this.toScreen(10, m*10+b);
    const points=prob.pts.map(p=>{ const [cx,cy]=this.toScreen(p.x,p.y); return { cx,cy, fill: won?"#18C29C":"#FF5E8A" }; });
    const [bX,bY]=this.toScreen(0,b);
    // hint: check which point is off
    const onLine = prob.pts.every(p=> Math.abs(m*p.x+b - p.y)<1e-9);
    let hint = won? "" : (mHalf!==prob.mHalf? "Adjust the slope so the tilt matches" : "Slope looks good \u2014 fix the y-intercept");
    return {
      score, streak,
      grid,
      lineX1:x1, lineY1:y1, lineX2:x2, lineY2:y2, lineCol: won?"#18C29C":"#10463A",
      points, bX, bY,
      mLabel: Number.isInteger(m)? String(m) : (m.toFixed(1)),
      mHalf, b, bAbs:Math.abs(b), bSign: b<0? "\u2212":"+",
      onM:this.onM, onB:this.onB, next:this.next,
      won, notWon:!won, hint,
    };
  }
}
</script>
</body>
</html>

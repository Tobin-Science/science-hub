<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./react.production.min.js"></script><script src="./react-dom.production.min.js"></script><script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;}
    @keyframes hop{0%{transform:translate(-50%,0)}50%{transform:translate(-50%,-34px)}100%{transform:translate(-50%,0)}}
    @keyframes shake{0%,100%{transform:translate(-50%,0)}20%{transform:translate(calc(-50% - 6px),0)}60%{transform:translate(calc(-50% + 6px),0)}}
    @keyframes bannerin{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
  </style>
</helmet>
<div style="min-height:100vh;background:#E7FBF1;background-image:radial-gradient(#C2EFD8 2px,transparent 2px);background-size:32px 32px;font-family:Nunito,sans-serif;color:#0C4A30;padding:22px 24px 60px;">
  <div style="max-width:980px;margin:0 auto;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <a href="Grade 6 Arcade Hub.dc.html" style="text-decoration:none;font-family:Fredoka,sans-serif;font-weight:600;font-size:15px;color:#0C4A30;background:#fff;border:3px solid #0C4A30;border-radius:999px;padding:8px 16px;box-shadow:3px 3px 0 #0C4A30;">&larr; Arcade</a>
      <div style="display:flex;gap:10px;">
        <div style="background:#fff;border:3px solid #0C4A30;border-radius:14px;padding:6px 14px;box-shadow:3px 3px 0 #0C4A30;text-align:center;min-width:78px;">
          <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:#5C9C7E;">SCORE</div>
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:22px;line-height:1;">{{ score }}</div>
        </div>
        <div style="background:#FFD23F;border:3px solid #0C4A30;border-radius:14px;padding:6px 14px;box-shadow:3px 3px 0 #0C4A30;text-align:center;min-width:78px;">
          <div style="font-size:11px;font-weight:800;letter-spacing:1px;color:#8A6D00;">STREAK</div>
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:22px;line-height:1;">{{ streak }}🔥</div>
        </div>
      </div>
    </div>

    <div style="text-align:center;margin-bottom:6px;">
      <span style="font-family:Fredoka,sans-serif;font-weight:600;font-size:13px;background:#15A36B;color:#fff;border:2px solid #0C4A30;border-radius:999px;padding:4px 12px;">6.PAR.7 &middot; Solve-It Scale</span>
    </div>

    <div style="background:#fff;border:3px solid #0C4A30;border-radius:22px;box-shadow:6px 6px 0 #0C4A30;padding:20px 26px;margin-bottom:22px;text-align:center;">
      <div style="font-size:14px;font-weight:800;letter-spacing:1px;color:#5C9C7E;text-transform:uppercase;margin-bottom:4px;">{{ kindLabel }}</div>
      <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:40px;">{{ prompt }}</div>
      <div style="font-weight:700;color:#5C9C7E;font-size:15px;margin-top:4px;">{{ sub }}</div>
    </div>

    <div style="background:#fff;border:3px solid #0C4A30;border-radius:22px;box-shadow:6px 6px 0 #0C4A30;padding:50px 30px 28px;">
      <div ref="{{ trackRef }}" onPointerDown="{{ onDown }}" onPointerMove="{{ onMove }}" onPointerUp="{{ onUp }}" tabindex="0" onKeyDown="{{ onKey }}" style="position:relative;height:70px;margin:0 14px;cursor:pointer;outline:none;touch-action:none;">
        <div style="position:absolute;top:34px;left:0;right:0;height:6px;background:#0C4A30;border-radius:3px;"></div>
        <sc-if value="{{ showRay }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:30px;left:{{ rayLeft }}%;width:{{ rayW }}%;height:14px;background:rgba(21,163,107,.4);border-radius:7px;"></div>
        </sc-if>
        <sc-for list="{{ ticks }}" as="t" hint-placeholder-count="16">
          <div style="position:absolute;top:24px;left:{{ t.leftPct }}%;transform:translateX(-50%);">
            <div style="width:3px;height:22px;background:#0C4A30;margin:0 auto;"></div>
            <div style="font-family:Fredoka,sans-serif;font-weight:600;font-size:13px;color:#5C9C7E;text-align:center;margin-top:4px;">{{ t.label }}</div>
          </div>
        </sc-for>
        <sc-if value="{{ showGhost }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute;top:6px;left:{{ ghostLeft }}%;transform:translateX(-50%);pointer-events:none;font-size:22px;opacity:.4;">⬇️</div>
        </sc-if>
        <div style="position:absolute;top:14px;left:{{ markerLeft }}%;{{ markerAnim }};pointer-events:none;">
          <sc-if value="{{ isEq }}" hint-placeholder-val="{{ true }}">
            <div style="width:30px;height:30px;border-radius:50%;background:#15A36B;border:3px solid #0C4A30;box-shadow:2px 2px 0 #0C4A30;"></div>
          </sc-if>
          <sc-if value="{{ isIneq }}" hint-placeholder-val="{{ false }}">
            <div style="width:30px;height:30px;border-radius:50%;background:{{ dotFill }};border:3px solid #15A36B;box-shadow:2px 2px 0 #0C4A30;"></div>
          </sc-if>
        </div>
      </div>

      <sc-if value="{{ isIneq }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;gap:14px;justify-content:center;margin-top:30px;">
          <button onClick="{{ toggleClosed }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:17px;background:#fff;color:#0C4A30;border:3px solid #0C4A30;border-radius:12px;padding:10px 18px;box-shadow:3px 3px 0 #0C4A30;cursor:pointer;">{{ closedLabel }}</button>
          <button onClick="{{ toggleDir }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:17px;background:#fff;color:#0C4A30;border:3px solid #0C4A30;border-radius:12px;padding:10px 18px;box-shadow:3px 3px 0 #0C4A30;cursor:pointer;">{{ dirLabel }}</button>
        </div>
      </sc-if>
    </div>

    <div style="display:flex;gap:14px;justify-content:center;align-items:center;margin-top:24px;min-height:58px;">
      <sc-if value="{{ playing }}" hint-placeholder-val="{{ true }}">
        <button onClick="{{ skip }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:17px;background:#fff;color:#0C4A30;border:3px solid #0C4A30;border-radius:14px;padding:13px 22px;box-shadow:4px 4px 0 #0C4A30;cursor:pointer;">Skip</button>
        <button onClick="{{ check }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:22px;background:#15A36B;color:#fff;border:3px solid #0C4A30;border-radius:14px;padding:13px 40px;box-shadow:4px 4px 0 #0C4A30;cursor:pointer;">Check ✓</button>
      </sc-if>
      <sc-if value="{{ showResult }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;align-items:center;gap:16px;animation:bannerin .3s ease both;">
          <div style="font-family:Fredoka,sans-serif;font-weight:700;font-size:20px;color:{{ resultCol }};background:{{ resultBg }};border:3px solid #0C4A30;border-radius:14px;padding:11px 22px;box-shadow:4px 4px 0 #0C4A30;">{{ resultMsg }}</div>
          <button onClick="{{ next }}" style="font-family:Fredoka,sans-serif;font-weight:600;font-size:18px;background:#FFD23F;color:#0C4A30;border:3px solid #0C4A30;border-radius:14px;padding:12px 28px;box-shadow:4px 4px 0 #0C4A30;cursor:pointer;">Next &rarr;</button>
        </div>
      </sc-if>
    </div>
    <p style="text-align:center;font-size:14px;font-weight:700;color:#5C9C7E;margin-top:16px;">{{ tip }}</p>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.trackRef=React.createRef();
    this.MIN=0; this.MAX=15;
    this.state={ score:0, streak:0, ...this.fresh(), status:"play", dragging:false };
  }
  rnd(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
  fresh(){
    const prob=this.makeProb();
    return { prob, pos:0, closed:true, dir:"right" };
  }
  makeProb(){
    const isEq=Math.random()<0.5;
    if(isEq){
      const t=this.rnd(0,2); let prompt,sol;
      if(t===0){ const p=this.rnd(1,9), sol0=this.rnd(0,10); prompt="x + "+p+" = "+(sol0+p); sol=sol0; }
      else if(t===1){ const p=this.rnd(2,5), sol0=this.rnd(0,6); prompt=p+"x = "+(p*sol0); sol=sol0; }
      else { const p=this.rnd(2,4), sol0=this.rnd(2,7); prompt="x / "+p+" = "+sol0; sol=sol0*p; }
      return { mode:"eq", prompt, sub:"Drag the dot to the solution, then Check.", sol };
    }
    const ops=[{s:">",cl:false,dir:"right"},{s:"\u2265",cl:true,dir:"right"},{s:"<",cl:false,dir:"left"},{s:"\u2264",cl:true,dir:"left"}];
    const o=ops[this.rnd(0,3)];
    const t=this.rnd(0,1); let prompt,c;
    if(t===0){ const p=this.rnd(1,7), c0=this.rnd(1,9); prompt="x + "+p+" "+o.s+" "+(c0+p); c=c0; }
    else { const p=this.rnd(2,4), c0=this.rnd(1,5); prompt=p+"x "+o.s+" "+(p*c0); c=c0; }
    return { mode:"ineq", prompt, sub:"Set the boundary, open/closed, and direction.", c, closed:o.cl, dir:o.dir };
  }
  valFromX(clientX){
    const el=this.trackRef.current; if(!el) return this.state.pos;
    const r=el.getBoundingClientRect();
    let frac=(clientX-r.left)/r.width; frac=Math.max(0,Math.min(1,frac));
    return Math.max(this.MIN,Math.min(this.MAX,Math.round(this.MIN+frac*(this.MAX-this.MIN))));
  }
  onDown=(e)=>{ if(this.state.status!=="play") return; try{ e.currentTarget.setPointerCapture(e.pointerId); }catch(_){} this.setState({dragging:true,pos:this.valFromX(e.clientX)}); };
  onMove=(e)=>{ if(!this.state.dragging) return; this.setState({pos:this.valFromX(e.clientX)}); };
  onUp=()=>{ if(this.state.dragging) this.setState({dragging:false}); };
  onKey=(e)=>{ if(this.state.status!=="play") return;
    if(e.key==="ArrowLeft"){ e.preventDefault(); this.setState(s=>({pos:Math.max(this.MIN,s.pos-1)})); }
    else if(e.key==="ArrowRight"){ e.preventDefault(); this.setState(s=>({pos:Math.min(this.MAX,s.pos+1)})); }
  };
  toggleClosed=()=>{ if(this.state.status==="play") this.setState(s=>({closed:!s.closed})); };
  toggleDir=()=>{ if(this.state.status==="play") this.setState(s=>({dir:s.dir==="right"?"left":"right"})); };
  check=()=>{ if(this.state.status!=="play") return;
    const { prob, pos, closed, dir }=this.state;
    let ok;
    if(prob.mode==="eq") ok = pos===prob.sol;
    else ok = pos===prob.c && closed===prob.closed && dir===prob.dir;
    if(ok) this.setState(s=>({status:"right",score:s.score+15+Math.min(s.streak,5)*2,streak:s.streak+1}));
    else this.setState({status:"wrong",streak:0});
  };
  next=()=>{ this.setState({...this.fresh(),status:"play"}); };
  skip=()=>{ this.setState({...this.fresh(),status:"play",streak:0}); };
  renderVals(){
    const { prob, pos, closed, dir, score, streak, status }=this.state;
    const span=this.MAX-this.MIN;
    const pct=(v)=>(v-this.MIN)/span*100;
    const ticks=[]; for(let v=0;v<=15;v++) ticks.push({leftPct:pct(v),label:String(v)});
    const isEq=prob.mode==="eq", isIneq=prob.mode==="ineq";
    const right=status==="right", wrong=status==="wrong";
    let markerAnim="transition:left .12s ease;transform:translateX(-50%);";
    if(right) markerAnim="transition:left .25s cubic-bezier(.3,1.6,.5,1);transform:translateX(-50%);animation:hop .45s ease;";
    if(wrong) markerAnim="transform:translateX(-50%);animation:shake .4s ease;";
    const markerVal = isEq ? (right?prob.sol:pos) : pos;
    const rayLeft = dir==="right"? pct(pos) : 0;
    const rayW = dir==="right"? (100-pct(pos)) : pct(pos);
    return {
      score, streak,
      kindLabel: isEq? "Solve & plot" : "Graph the solution",
      prompt: prob.prompt, sub: prob.sub,
      ticks, markerLeft: pct(markerVal), markerAnim,
      isEq, isIneq,
      dotFill: closed? "#15A36B":"#fff",
      showRay: isIneq, rayLeft, rayW,
      closedLabel: closed? "● closed (\u2265 / \u2264)":"○ open (> / <)",
      dirLabel: dir==="right"? "shade right \u2192":"\u2190 shade left",
      toggleClosed:this.toggleClosed, toggleDir:this.toggleDir,
      trackRef:this.trackRef, onDown:this.onDown, onMove:this.onMove, onUp:this.onUp, onKey:this.onKey,
      check:this.check, next:this.next, skip:this.skip,
      playing:status==="play", showResult:right||wrong,
      showGhost: wrong && isEq, ghostLeft: pct(prob.sol),
      resultMsg: right? "Nice! +15" : (isEq? ("x = "+prob.sol) : "Check boundary, dot & direction"),
      resultCol: right?"#0C4A30":"#B0234A",
      resultBg: right?"#D6F7E2":"#FFE0EA",
      tip: isEq? "Drag the dot \u00b7 or use \u2190 \u2192 keys" : "Drag the boundary dot \u00b7 toggle open/closed & direction below",
    };
  }
}
</script>
</body>
</html>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tw{0%,100%{opacity:.2}50%{opacity:1}}\n  @keyframes pop{0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div data-screen-label=\"Unit 2 — Working with Expressions\" style=\"min-height:100vh;padding:26px 0 80px;background:radial-gradient(130% 110% at 82% -8%,var(--bg1,#241a52) 0%,var(--bg2,#0f0d22) 62%);{{ themeVars }}\">\n<div style=\"max-width:1000px;margin:0 auto;padding:0 22px;display:flex;flex-direction:column;gap:26px\">\n\n  <!-- HERO -->\n  <div style=\"position:relative;overflow:hidden;border-radius:22px;background:radial-gradient(120% 130% at 80% 10%,var(--hero1,#3a2b86) 0%,var(--hero2,#1d1746) 55%,var(--hero3,#120f30) 100%);border:1px solid rgba(255,255,255,0.18);box-shadow:0 30px 70px -30px rgba(20,10,50,0.8)\">\n    <div style=\"position:absolute;top:30px;right:90px;width:3px;height:3px;border-radius:50%;background:#fff;animation:tw 2.6s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:120px;left:80px;width:2px;height:2px;border-radius:50%;background:#cfe6ff;animation:tw 3.4s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:relative;padding:40px 44px 44px\">\n      <div style=\"display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.16em;color:var(--on,#c5bcff);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:999px;padding:6px 14px\">UNIT 2 · 7TH GRADE MATH · GA STANDARD 7.PAR.2<\u002Fdiv>\n      <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(32px,5vw,52px);line-height:1.05;letter-spacing:-0.02em;margin:16px 0 0;color:#fff;text-wrap:balance\">Working with<br>Expressions<\u002Fh1>\n      <p style=\"max-width:600px;margin:16px 0 0;font-size:17px;line-height:1.6;color:#e2ddf6\">An expression is a math phrase — a recipe written with numbers, variables, and operations. The same recipe can be written many ways. You'll learn to combine like terms, expand with the distributive property, factor, and rewrite expressions to reveal what they really mean.<\u002Fp>\n      <div style=\"margin-top:28px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.16em;color:var(--on,#c5bcff);opacity:.85\">WHAT YOU'LL LEARN<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:14px\">\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">01<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">Terms, coefficients &amp; like terms<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">02<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">Combining like terms<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">03<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">The distributive property<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">04<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">Factoring out the GCF<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">05<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">Equivalent expressions<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:11px;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:11px 14px\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">★<\u002Fspan><span style=\"font-size:14px;color:#efeafb\">Writing expressions from stories<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- 2.1 PARTS -->\n  <section data-screen-label=\"2.1 The Parts of an Expression\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;box-shadow:0 6px 16px -6px var(--a2,#4a3fb8)\">2.1<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">The Parts of an Expression<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#3c3d57\">An <strong>expression<\u002Fstrong> like <strong>7x + 3<\u002Fstrong> is built from <strong>terms<\u002Fstrong> (the pieces separated by + or −). A term can be a <strong>variable<\u002Fstrong> (a letter standing for an unknown), a <strong>constant<\u002Fstrong> (just a number), or a number times a variable. The number multiplying a variable is its <strong>coefficient<\u002Fstrong>. Terms that have the exact same variable part are <strong>like terms<\u002Fstrong> — only like terms can be combined.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:18px\">\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:14px 16px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--a2,#4a3fb8);font-size:17px\">Coefficient<\u002Fdiv><div style=\"font-size:13.5px;color:#55566f;margin-top:4px;line-height:1.5\">In 7x, the <strong>7<\u002Fstrong> — how many x's.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:14px 16px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--a2,#4a3fb8);font-size:17px\">Variable<\u002Fdiv><div style=\"font-size:13.5px;color:#55566f;margin-top:4px;line-height:1.5\">The <strong>x<\u002Fstrong> — a value that can change.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:14px 16px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--a2,#4a3fb8);font-size:17px\">Constant<\u002Fdiv><div style=\"font-size:13.5px;color:#55566f;margin-top:4px;line-height:1.5\">The <strong>3<\u002Fstrong> — a fixed number on its own.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:14px 16px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--a2,#4a3fb8);font-size:17px\">Like Terms<\u002Fdiv><div style=\"font-size:13.5px;color:#55566f;margin-top:4px;line-height:1.5\"><strong>3x &amp; 5x<\u002Fstrong> match; 3x &amp; 5 do not.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:15px;line-height:1.6;color:#55566f;margin-top:18px\">Sort each term into the right pile — does it carry an <strong>x<\u002Fstrong>, or is it a plain <strong>constant<\u002Fstrong>? Tap a term, then tap a bin.<\u002Fp>\n    <div style=\"margin-top:12px\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:9px;justify-content:center;min-height:44px;background:#f3f0e8;border:1px dashed #d8d2c4;border-radius:12px;padding:12px\">\n        <sc-for list=\"{{ sorts.terms.tray }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.name }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px\">\n        <sc-for list=\"{{ sorts.terms.bins }}\" as=\"b\" hint-placeholder-count=\"2\">\n          <div onclick=\"{{ b.onDrop }}\" style=\"background:#fff;border:2px solid #e7e3d8;border-radius:14px;padding:14px;min-height:90px;cursor:pointer\">\n            <div style=\"{{ b.headStyle }}\">{{ b.label }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:10px\">\n              <sc-for list=\"{{ b.chips }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <button onclick=\"{{ c.onClick }}\" style=\"{{ c.style }}\">{{ c.name }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;margin-top:12px;flex-wrap:wrap\">\n        <button onclick=\"{{ sorts.terms.onCheck }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;color:#fff;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));border:none;border-radius:10px;padding:10px 20px;cursor:pointer\">Check my sort<\u002Fbutton>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--a2,#4a3fb8)\">{{ sorts.terms.feedback }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2.2 COMBINE -->\n  <section data-screen-label=\"2.2 Combining Like Terms\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;box-shadow:0 6px 16px -6px var(--a2,#4a3fb8)\">2.2<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Combining Like Terms<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#3c3d57\">To simplify, group the like terms and add their coefficients — the variable stays the same. Think of it as counting: <strong>3 apples + 2 apples = 5 apples<\u002Fstrong>, so <strong>3x + 2x = 5x<\u002Fstrong>. Constants combine with constants. Step through each one:<\u002Fp>\n    <div style=\"margin:18px 0 4px;background:radial-gradient(120% 130% at 72% 8%,var(--hero1,#3a2b86),var(--hero3,#120f30));border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.16)\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:18px\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.14em;color:var(--on,#c5bcff)\">SIMPLIFY STEP-BY-STEP<\u002Fspan>\n        <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n          <sc-for list=\"{{ combine.tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.name }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;display:flex;flex-direction:column;gap:12px;align-items:center\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#fff\">{{ combine.cur.expr }}<\u002Fdiv>\n        <sc-if value=\"{{ combine.showGroup }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:24px;color:var(--on,#c5bcff)\">↓ group like terms<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#fff\">{{ combine.cur.step1 }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ combine.showResult }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:24px;color:var(--on,#c5bcff)\">↓ add coefficients<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:32px;color:#ffd271;animation:pop .3s ease\">{{ combine.cur.result }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px\">\n        <button onclick=\"{{ combine.onPrev }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#fff;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:9px;padding:9px 16px;cursor:pointer\">‹ Back<\u002Fbutton>\n        <button onclick=\"{{ combine.onNext }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));border:none;border-radius:9px;padding:9px 18px;cursor:pointer\">{{ combine.nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2.3 DISTRIBUTE -->\n  <section data-screen-label=\"2.3 The Distributive Property\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;box-shadow:0 6px 16px -6px var(--a2,#4a3fb8)\">2.3<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">The Distributive Property: Expanding<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#3c3d57\">To <strong>expand<\u002Fstrong> something like <strong>3(x + 4)<\u002Fstrong>, multiply the outside number by <em>every<\u002Fem> term inside. An <strong>area model<\u002Fstrong> makes it obvious: a rectangle that is <strong>3<\u002Fstrong> tall and <strong>(x + 4)<\u002Fstrong> wide has total area <strong>3x + 12<\u002Fstrong> — the two pieces added together. Pick an expression:<\u002Fp>\n    <div style=\"margin:18px 0 4px;background:radial-gradient(120% 130% at 72% 8%,var(--hero1,#3a2b86),var(--hero3,#120f30));border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.16)\">\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:20px\">\n        <sc-for list=\"{{ expand.tabs }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.name }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:14px\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:4px\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:var(--on,#c5bcff)\">{{ expand.cur.mult }}<\u002Fdiv>\n          <div style=\"font-size:10px;color:#b6abe6;letter-spacing:.1em\">HEIGHT<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.25);min-width:300px\">\n          <div style=\"flex:1.6;background:rgba(255,255,255,0.1);padding:22px 14px;text-align:center;border-right:1px solid rgba(255,255,255,0.2)\">\n            <div style=\"font-size:12px;color:#cfc6f2\">{{ expand.cur.t1 }}<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#fff;margin-top:6px\">{{ expand.cur.prod1 }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:rgba(255,255,255,0.05);padding:22px 14px;text-align:center\">\n            <div style=\"font-size:12px;color:#cfc6f2\">{{ expand.cur.t2 }}<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;color:#fff;margin-top:6px\">{{ expand.cur.prod2 }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:20px\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:#fff\">{{ expand.cur.expr }}<\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:var(--on,#c5bcff)\"> = <\u002Fspan>\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:#ffd271\">{{ expand.cur.result }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2.4 FACTOR -->\n  <section data-screen-label=\"2.4 Factoring Out the GCF\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;box-shadow:0 6px 16px -6px var(--a2,#4a3fb8)\">2.4<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Factoring Out the GCF<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#3c3d57\"><strong>Factoring<\u002Fstrong> is expanding in reverse. Find the <strong>greatest common factor (GCF)<\u002Fstrong> of the terms and pull it outside the parentheses. Since <strong>6x + 9<\u002Fstrong> both share a factor of 3, it becomes <strong>3(2x + 3)<\u002Fstrong>. Predict each, then reveal:<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;margin-top:14px\">\n      <sc-for list=\"{{ reveals.factor }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:15px 16px;display:flex;flex-direction:column;gap:11px\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:#2c2d44\">{{ c.q }}<\u002Fdiv>\n          <button onclick=\"{{ c.onClick }}\" style=\"align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));border:none;border-radius:8px;padding:7px 15px;cursor:pointer\">{{ c.label }}<\u002Fbutton>\n          <div style=\"{{ c.panel }}\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--a2,#4a3fb8)\">{{ c.answer }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#55566f;margin-top:4px;line-height:1.5\">{{ c.why }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2.5 EQUIVALENT -->\n  <section data-screen-label=\"2.5 Equivalent Expressions\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;box-shadow:0 6px 16px -6px var(--a2,#4a3fb8)\">2.5<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Equivalent Expressions<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:16.5px;line-height:1.65;color:#3c3d57\">Two expressions are <strong>equivalent<\u002Fstrong> if they give the same value for <em>every<\u002Fem> number you plug in. That's why <strong>2(x + 3)<\u002Fstrong> and <strong>2x + 6<\u002Fstrong> are equal — they're the same recipe in different forms. Drag the slider to test a pair at different values of x:<\u002Fp>\n    <div style=\"margin:18px 0 4px;background:radial-gradient(120% 130% at 72% 8%,var(--hero1,#3a2b86),var(--hero3,#120f30));border-radius:16px;padding:24px;border:1px solid rgba(255,255,255,0.16)\">\n      <div style=\"display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:18px\">\n        <sc-for list=\"{{ equiv.tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.name }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap\">\n        <div style=\"background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:16px 22px;text-align:center;min-width:130px\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#fff\">{{ equiv.A }}<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:var(--on,#c5bcff);margin-top:8px\">{{ equiv.valA }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:{{ equiv.eqColor }}\">{{ equiv.eqSign }}<\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:16px 22px;text-align:center;min-width:130px\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#fff\">{{ equiv.B }}<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:var(--on,#c5bcff);margin-top:8px\">{{ equiv.valB }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"max-width:360px;margin:20px auto 0;text-align:center\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-size:14px;color:#e2ddf6;margin-bottom:8px\">x = {{ equiv.x }}<\u002Fdiv>\n        <input type=\"range\" min=\"-5\" max=\"5\" step=\"1\" value=\"{{ equiv.x }}\" oninput=\"{{ equiv.onX }}\" style=\"width:100%;accent-color:var(--a1,#7c63ff)\">\n      <\u002Fdiv>\n      <div style=\"text-align:center;margin-top:14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:{{ equiv.eqColor }}\">{{ equiv.verdict }}<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:15px;line-height:1.6;color:#55566f;margin-top:18px\">Now write an expression from the words, then reveal:<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:8px\">\n      <sc-for list=\"{{ reveals.context }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:11px\">\n          <div style=\"font-size:14.5px;color:#2c2d44;font-weight:500;line-height:1.55\">{{ c.q }}<\u002Fdiv>\n          <button onclick=\"{{ c.onClick }}\" style=\"align-self:flex-start;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;color:#fff;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));border:none;border-radius:8px;padding:7px 15px;cursor:pointer\">{{ c.label }}<\u002Fbutton>\n          <div style=\"{{ c.panel }}\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--a2,#4a3fb8)\">{{ c.answer }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#55566f;margin-top:4px;line-height:1.5\">{{ c.why }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ACTIVITIES -->\n  <sc-if value=\"{{ showActivities }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Try It at Home\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:10px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px\">✏️<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Try It at Home — Mini Activities<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:14px\">\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:14px;padding:18px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1c1d33\">📐 Build an area model<\u002Fdiv><p style=\"font-size:14px;color:#55566f;line-height:1.55;margin:8px 0 0\">Draw a rectangle 4 units tall and (x + 3) wide on grid paper. Label the two areas, then add them to expand 4(x + 3).<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:14px;padding:18px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1c1d33\">🧮 Two ways to total<\u002Fdiv><p style=\"font-size:14px;color:#55566f;line-height:1.55;margin:8px 0 0\">For a $7 movie and $x snack for 3 friends, write the cost as 3(7 + x) AND as 21 + 3x. Plug in x = 4 — do both match?<\u002Fp><\u002Fdiv>\n      <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:14px;padding:18px\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#1c1d33\">🔎 Spot the GCF<\u002Fdiv><p style=\"font-size:14px;color:#55566f;line-height:1.55;margin:8px 0 0\">Write five expressions like 12x + 18. For each, find the GCF and factor it. Check by expanding back.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- VOCAB -->\n  <section data-screen-label=\"Vocabulary Flashcards\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:14px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px\">🔤<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Vocabulary Flashcards<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:#7a7b94\">\n      <span>Card {{ fc.index1 }} / {{ fc.total }}<\u002Fspan>\n      <span>{{ fc.knownCount }} marked known<\u002Fspan>\n    <\u002Fdiv>\n    <div onclick=\"{{ fc.onFlip }}\" style=\"cursor:pointer;background:radial-gradient(120% 130% at 72% 8%,var(--hero1,#3a2b86),var(--hero3,#120f30));border:1px solid rgba(255,255,255,0.16);border-radius:16px;padding:38px 28px;min-height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center\">\n      <sc-if value=\"{{ fc.showTerm }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#fff\">{{ fc.term }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--on,#c5bcff);margin-top:12px;letter-spacing:.08em\">TAP TO FLIP<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ fc.flipped }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:18px;color:#efeafb;line-height:1.55;max-width:560px\">{{ fc.def }}<\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--on,#c5bcff);margin-top:14px;letter-spacing:.08em\">TAP TO FLIP BACK<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap\">\n      <button onclick=\"{{ fc.onPrev }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;color:#3c3d57;background:#fff;border:1.5px solid #e7e3d8;border-radius:10px;padding:10px 18px;cursor:pointer\">‹ Prev<\u002Fbutton>\n      <button onclick=\"{{ fc.onKnow }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;color:#fff;border:none;border-radius:10px;padding:10px 20px;cursor:pointer;background:{{ fc.knowBg }}\">{{ fc.knowLabel }}<\u002Fbutton>\n      <button onclick=\"{{ fc.onNext }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13.5px;color:#3c3d57;background:#fff;border:1.5px solid #e7e3d8;border-radius:10px;padding:10px 18px;cursor:pointer\">Next ›<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUIZ -->\n  <section data-screen-label=\"Check Your Understanding\" style=\"background:#fbfaf6;border:1px solid #e7e3d8;border-radius:18px;padding:30px 32px;box-shadow:0 18px 40px -28px rgba(15,10,40,0.6)\">\n    <div style=\"display:flex;align-items:center;gap:13px;margin-bottom:6px\">\n      <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px\">✅<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:25px;margin:0;color:#1c1d33\">Check Your Understanding<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-size:15px;line-height:1.6;color:#55566f;margin:0 0 18px\">Answer all {{ quiz.total }} questions, then check your score.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:18px\">\n      <sc-for list=\"{{ quiz.list }}\" as=\"q\" hint-placeholder-count=\"7\">\n        <div style=\"background:#fff;border:1px solid #e7e3d8;border-radius:14px;padding:18px 20px\">\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;color:#1c1d33;margin-bottom:12px\">{{ q.num }}. {{ q.q }}<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <sc-for list=\"{{ q.choices }}\" as=\"ch\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ ch.onClick }}\" style=\"{{ ch.style }}\">\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--a2,#4a3fb8);min-width:18px\">{{ ch.letter }}<\u002Fspan>\n                <span style=\"flex:1\">{{ ch.text }}<\u002Fspan>\n                <span style=\"font-weight:700\">{{ ch.mark }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px;margin-top:18px;flex-wrap:wrap\">\n      <sc-if value=\"{{ quiz.submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ quiz.onRetry }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#3c3d57;background:#fff;border:1.5px solid #e7e3d8;border-radius:10px;padding:11px 22px;cursor:pointer\">↺ Try Again<\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ quiz.notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ quiz.onSubmit }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));border:none;border-radius:10px;padding:11px 24px;cursor:pointer\">Check my answers<\u002Fbutton>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <sc-if value=\"{{ quiz.submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:16px;border-radius:14px;padding:18px 20px;background:{{ quiz.resultBg }};border:1px solid {{ quiz.resultBorder }}\">\n        <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:19px;color:{{ quiz.resultColor }}\">{{ quiz.resultEmoji }} You got {{ quiz.score }} / {{ quiz.total }}<\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#3c3d57;line-height:1.55;margin-top:6px\">{{ quiz.resultMsg }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n\n  <!-- RECAP -->\n  <sc-if value=\"{{ showRecap }}\" hint-placeholder-val=\"{{ true }}\">\n  <section data-screen-label=\"Key Takeaways\" style=\"position:relative;overflow:hidden;border-radius:18px;background:radial-gradient(120% 130% at 80% 10%,var(--hero1,#3a2b86),var(--hero3,#120f30));border:1px solid rgba(255,255,255,0.16);padding:32px 34px\">\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;margin:0 0 16px;color:#fff\">Key Takeaways<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:11px\">\n      <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">→<\u002Fspan><span style=\"font-size:15.5px;color:#efeafb;line-height:1.55\">Expressions are made of <strong>terms<\u002Fstrong>; the number on a variable is its <strong>coefficient<\u002Fstrong>.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">→<\u002Fspan><span style=\"font-size:15.5px;color:#efeafb;line-height:1.55\">Combine <strong>like terms<\u002Fstrong> by adding their coefficients; the variable stays the same.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">→<\u002Fspan><span style=\"font-size:15.5px;color:#efeafb;line-height:1.55\">The <strong>distributive property<\u002Fstrong> expands a(b + c) into ab + ac.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">→<\u002Fspan><span style=\"font-size:15.5px;color:#efeafb;line-height:1.55\"><strong>Factoring<\u002Fstrong> pulls the GCF back out — it's expanding in reverse.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:12px;align-items:flex-start\"><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--on,#c5bcff)\">→<\u002Fspan><span style=\"font-size:15.5px;color:#efeafb;line-height:1.55\"><strong>Equivalent expressions<\u002Fstrong> give the same value for every input — different forms reveal different meanings.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <div style=\"text-align:center;font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:.1em;color:#6a5d90;padding-top:4px\">7TH GRADE MATH · UNIT 2 OF 7 · GA 7.PAR.2<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1100,&quot;height&quot;:960},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Aurora&quot;,&quot;options&quot;:[&quot;Tide&quot;,&quot;Aurora&quot;,&quot;Ember&quot;,&quot;Forest&quot;,&quot;Cobalt&quot;,&quot;Berry&quot;,&quot;Sun&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;passingScore&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:7},&quot;showActivities&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showRecap&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.themes={\n      Tide:\"--a1:#17b3c4;--a2:#0d7f92;--bg1:#163d49;--bg2:#0b151c;--hero1:#15545f;--hero2:#0e323d;--hero3:#0a1d25;--tint:#e2f5f7;--tintbd:#bfe8ee;--on:#7fe0ea\",\n      Aurora:\"--a1:#7c63ff;--a2:#4a3fb8;--bg1:#241a52;--bg2:#0f0d22;--hero1:#3a2b86;--hero2:#1d1746;--hero3:#120f30;--tint:#efeaff;--tintbd:#d8cdff;--on:#c5bcff\",\n      Ember:\"--a1:#f0913a;--a2:#c25e12;--bg1:#3c2412;--bg2:#1c1108;--hero1:#5a3015;--hero2:#3a1c0e;--hero3:#241208;--tint:#fff1e4;--tintbd:#f3d6b8;--on:#ffc79a\",\n      Forest:\"--a1:#36b06a;--a2:#1f7d49;--bg1:#163f2a;--bg2:#0a1a11;--hero1:#16432b;--hero2:#0e2c1c;--hero3:#081a10;--tint:#e7f6ee;--tintbd:#bfe6cf;--on:#a8e6c2\",\n      Cobalt:\"--a1:#4f7cf0;--a2:#2f4fb8;--bg1:#16244f;--bg2:#0a0f22;--hero1:#1f3478;--hero2:#162552;--hero3:#0d1530;--tint:#e8eeff;--tintbd:#c7d5fb;--on:#a8c0ff\",\n      Berry:\"--a1:#d6477f;--a2:#9e2c5a;--bg1:#3f1530;--bg2:#1c0a16;--hero1:#5a1c40;--hero2:#3a122a;--hero3:#240b1a;--tint:#fde8f1;--tintbd:#f5c9dd;--on:#ffa9cd\",\n      Sun:\"--a1:#e0a92e;--a2:#a87c12;--bg1:#3c2f12;--bg2:#1c1608;--hero1:#5a4715;--hero2:#3a2e0e;--hero3:#241c08;--tint:#fff6e0;--tintbd:#f3e3b0;--on:#ffd87a\"\n    };\n    this.combineData=[\n      {expr:'3x + 5 + 2x \\u2212 1',step1:'(3x + 2x) + (5 \\u2212 1)',result:'5x + 4'},\n      {expr:'7y \\u2212 2 \\u2212 4y + 6',step1:'(7y \\u2212 4y) + (\\u22122 + 6)',result:'3y + 4'},\n      {expr:'4a + 3b \\u2212 a + 2b',step1:'(4a \\u2212 a) + (3b + 2b)',result:'3a + 5b'}\n    ];\n    this.expandData=[\n      {name:'3(x + 4)',expr:'3(x + 4)',mult:'3',t1:'x',t2:'+4',prod1:'3x',prod2:'12',result:'3x + 12'},\n      {name:'2(x + 5)',expr:'2(x + 5)',mult:'2',t1:'x',t2:'+5',prod1:'2x',prod2:'10',result:'2x + 10'},\n      {name:'4(2x + 1)',expr:'4(2x + 1)',mult:'4',t1:'2x',t2:'+1',prod1:'8x',prod2:'4',result:'8x + 4'},\n      {name:'5(x \\u2212 2)',expr:'5(x \\u2212 2)',mult:'5',t1:'x',t2:'\\u22122',prod1:'5x',prod2:'\\u221210',result:'5x \\u2212 10'}\n    ];\n    this.equivData=[\n      {name:'Pair A',A:'2(x + 3)',B:'2x + 6',fa:x=>2*(x+3),fb:x=>2*x+6,equiv:true},\n      {name:'Pair B',A:'5x \\u2212 2x',B:'3x',fa:x=>5*x-2*x,fb:x=>3*x,equiv:true},\n      {name:'Pair C',A:'4 + 3x',B:'7x',fa:x=>4+3*x,fb:x=>7*x,equiv:false}\n    ];\n    this.reveal={\n      factor:[\n        {id:'fa1',q:'Factor 6x + 9',answer:'3(2x + 3)',why:'The GCF of 6 and 9 is 3; pull it out.'},\n        {id:'fa2',q:'Factor 10x \\u2212 15',answer:'5(2x \\u2212 3)',why:'The GCF of 10 and 15 is 5.'},\n        {id:'fa3',q:'Factor 4x + 8',answer:'4(x + 2)',why:'The GCF of 4 and 8 is 4.'}\n      ],\n      context:[\n        {id:'cx1',q:'A shirt costs x dollars. Write the cost of 3 shirts plus a $5 shipping fee.',answer:'3x + 5',why:'Three shirts at x each is 3x, plus the flat $5.'},\n        {id:'cx2',q:'You have y stickers, give away 4, then double what is left. Write it.',answer:'2(y \\u2212 4)',why:'Subtract 4 first, then multiply the whole result by 2.'},\n        {id:'cx3',q:'Expand 2(y \\u2212 4). What does the new form show?',answer:'2y \\u2212 8',why:'Your sticker count is doubled, and 8 are removed in total.'}\n      ]\n    };\n    this.sortCfg={\n      terms:{bins:[{key:'x',label:'x-terms (have a variable)',color:'#7c5bf0'},{key:'c',label:'Constants (just numbers)',color:'#d97a1f'}],\n        correct:{'3x':'x','\\u22125':'c','2x':'x','7':'c','\\u2212x':'x','4':'c'}}\n    };\n    this.vocab=[\n      {term:'Expression',def:'A math phrase with numbers, variables, and operations \\u2014 but no equals sign.'},\n      {term:'Term',def:'A single piece of an expression, separated by + or \\u2212 signs.'},\n      {term:'Coefficient',def:'The number multiplying a variable, like the 7 in 7x.'},\n      {term:'Variable',def:'A letter that stands for a value that can change.'},\n      {term:'Constant',def:'A term that is just a fixed number.'},\n      {term:'Like Terms',def:'Terms with the exact same variable part, so they can be combined.'},\n      {term:'Distributive Property',def:'a(b + c) = ab + ac \\u2014 multiply the outside by each inside term.'},\n      {term:'Expand',def:'To use the distributive property to remove parentheses.'},\n      {term:'Factor',def:'To rewrite a sum as a product by pulling out a common factor.'},\n      {term:'GCF',def:'Greatest Common Factor \\u2014 the largest factor shared by terms.'},\n      {term:'Equivalent Expressions',def:'Expressions that give the same value for every input.'},\n      {term:'Linear Expression',def:'An expression where each variable is only to the first power.'},\n      {term:'Simplify',def:'To rewrite an expression in its shortest equal form.'},\n      {term:'Substitute',def:'To replace a variable with a number to evaluate.'},\n      {term:'Sum',def:'The result of adding terms.'},\n      {term:'Product',def:'The result of multiplying \\u2014 what factoring creates.'}\n    ];\n    this.quizQ=[\n      {id:'q1',q:'Combine like terms: 4x + 3x',choices:['7x','12x','7x\\u00b2','7'],answer:0},\n      {id:'q2',q:'Expand: 3(x + 5)',choices:['3x + 5','3x + 15','x + 15','8x'],answer:1},\n      {id:'q3',q:'Factor: 8x + 12',choices:['2(4x + 6)','4(2x + 3)','8(x + 12)','4(2x + 12)'],answer:1},\n      {id:'q4',q:'Which pair are LIKE terms?',choices:['5x and 2x','5x and 5','x and x\\u00b2','3 and 3x'],answer:0},\n      {id:'q5',q:'Simplify: 6x + 2 \\u2212 x',choices:['5x + 2','6x + 2','7x + 2','5 + 2x'],answer:0},\n      {id:'q6',q:'2(x + 4) is equivalent to\\u2026',choices:['2x + 4','2x + 8','x + 8','2x + 6'],answer:1},\n      {id:'q7',q:'In 7x + 3, the coefficient of x is\\u2026',choices:['3','x','7','10'],answer:2}\n    ];\n    const blankSort=()=>({sel:null,binOf:{},checked:false});\n    this.state={cmbIdx:0,cmbStep:0,expIdx:0,equivIdx:0,exprX:2,revealed:{},sorts:{terms:blankSort()},fcIndex:0,fcFlipped:false,fcKnown:{},quizAns:{},quizSubmitted:false};\n  }\n\n  setCmb(i){ this.setState({cmbIdx:i,cmbStep:0}); }\n  stepCmb(d){ this.setState(s=>{ let n=s.cmbStep+d; if(n>2)n=0; if(n<0)n=0; return {cmbStep:n}; }); }\n  setExp(i){ this.setState({expIdx:i}); }\n  setEquiv(i){ this.setState({equivIdx:i}); }\n  setX(e){ this.setState({exprX:parseInt(e.target.value,10)}); }\n  toggleReveal(id){ this.setState(s=>({revealed:Object.assign({},s.revealed,{[id]:!s.revealed[id]})})); }\n  sortSelect(k,item){ this.setState(s=>{ const so=s.sorts[k]; const sel=so.sel===item?null:item; return {sorts:Object.assign({},s.sorts,{[k]:Object.assign({},so,{sel})})}; }); }\n  sortPlace(k,bin){ this.setState(s=>{ const so=s.sorts[k]; if(!so.sel) return {}; const binOf=Object.assign({},so.binOf,{[so.sel]:bin}); return {sorts:Object.assign({},s.sorts,{[k]:Object.assign({},so,{binOf,sel:null,checked:false})})}; }); }\n  sortReturn(k,item){ this.setState(s=>{ const so=s.sorts[k]; const binOf=Object.assign({},so.binOf); delete binOf[item]; return {sorts:Object.assign({},s.sorts,{[k]:Object.assign({},so,{binOf,sel:null,checked:false})})}; }); }\n  sortCheck(k){ this.setState(s=>({sorts:Object.assign({},s.sorts,{[k]:Object.assign({},s.sorts[k],{checked:true})})})); }\n  fcFlip(){ this.setState(s=>({fcFlipped:!s.fcFlipped})); }\n  fcGo(d){ this.setState(s=>({fcIndex:(s.fcIndex+d+this.vocab.length)%this.vocab.length,fcFlipped:false})); }\n  fcKnow(){ this.setState(s=>{ const t=this.vocab[s.fcIndex].term; return {fcKnown:Object.assign({},s.fcKnown,{[t]:!s.fcKnown[t]})}; }); }\n  selectAns(id,ci){ if(this.state.quizSubmitted) return; this.setState(s=>({quizAns:Object.assign({},s.quizAns,{[id]:ci})})); }\n  submitQuiz(){ this.setState({quizSubmitted:true}); }\n  retryQuiz(){ this.setState({quizAns:{},quizSubmitted:false}); }\n\n  buildSort(k){\n    const cfg=this.sortCfg[k]; const so=this.state.sorts[k];\n    const items=Object.keys(cfg.correct);\n    const chip=(name,where)=>{\n      const sel=so.sel===name; let bg='rgba(255,255,255,0.95)',bd='rgba(255,255,255,0.4)',col='#1c2730';\n      if(sel){ bg='var(--tint,#efeaff)'; bd='var(--a1,#7c63ff)'; col='#2a1f55'; }\n      if(so.checked && where!=='tray'){ if(cfg.correct[name]===where){bg='#e7f6ee';bd='#2fa36b';col='#1c4d34';} else {bg='#fdecea';bd='#e0574a';col='#7a2b24';} }\n      const onClick = where==='tray' ? ()=>this.sortSelect(k,name) : ()=>this.sortReturn(k,name);\n      return {name,onClick,style:\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;color:\"+col+\";background:\"+bg+\";border:1.5px solid \"+bd+\";border-radius:9px;padding:8px 16px;cursor:pointer;transition:all .15s ease\"};\n    };\n    const tray=items.filter(n=>!so.binOf[n]).map(n=>chip(n,'tray'));\n    const bins=cfg.bins.map(b=>({label:b.label,color:b.color,onDrop:()=>this.sortPlace(k,b.key),\n      chips:items.filter(n=>so.binOf[n]===b.key).map(n=>chip(n,b.key)),\n      headStyle:\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13.5px;color:\"+b.color}));\n    let correct=0; items.forEach(n=>{ if(so.binOf[n]===cfg.correct[n]) correct++; });\n    const allPlaced=items.every(n=>so.binOf[n]);\n    return {tray,bins,checked:so.checked,allPlaced,correct,total:items.length,\n      onCheck:()=>this.sortCheck(k),\n      feedback: so.checked ? (correct+' of '+items.length+' sorted correctly') : ''};\n  }\n\n  renderVals(){\n    const S=this.state;\n    const accent=this.props.accent ?? 'Aurora';\n    const themeVars=this.themes[accent] || this.themes.Aurora;\n    const baseTab=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;border-radius:9px;padding:8px 14px;cursor:pointer;transition:all .2s ease;\";\n    const onTab=baseTab+\"background:linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8));color:#fff;border:1px solid var(--a1,#7c63ff)\";\n    const offTab=baseTab+\"background:rgba(255,255,255,0.08);color:#d8d0f4;border:1px solid rgba(255,255,255,0.22)\";\n\n    // COMBINE\n    const cc=this.combineData[S.cmbIdx], cstep=S.cmbStep;\n    const combine={tabs:this.combineData.map((d,i)=>({name:'#'+(i+1),onClick:()=>this.setCmb(i),style:(i===S.cmbIdx?onTab:offTab)})),\n      cur:cc,showGroup:cstep>=1,showResult:cstep>=2,\n      onPrev:()=>this.stepCmb(-1),onNext:()=>this.stepCmb(1),\n      nextLabel:cstep>=2?'\\u21ba Replay':'Next \\u203a'};\n\n    // EXPAND\n    const ex=this.expandData[S.expIdx];\n    const expand={tabs:this.expandData.map((d,i)=>({name:d.name,onClick:()=>this.setExp(i),style:(i===S.expIdx?onTab:offTab)})),\n      cur:ex};\n\n    // EQUIV\n    const eq=this.equivData[S.equivIdx], x=S.exprX, va=eq.fa(x), vb=eq.fb(x), same=va===vb;\n    const equiv={tabs:this.equivData.map((d,i)=>({name:d.name,onClick:()=>this.setEquiv(i),style:(i===S.equivIdx?onTab:offTab)})),\n      A:eq.A,B:eq.B,valA:va,valB:vb,x,onX:e=>this.setX(e),\n      eqSign:same?'=':'\\u2260',eqColor:same?'#38c172':'#ef5a4f',\n      verdict: eq.equiv ? 'Equivalent \\u2014 equal for EVERY value of x' : (same?'Equal at this x \\u2014 but try others! Not always equal':'Not equivalent \\u2014 they differ here')};\n\n    // REVEALS\n    const mkRev=name=>this.reveal[name].map(r=>{ const open=!!S.revealed[r.id];\n      return {q:r.q,answer:r.answer,why:r.why,open,label:open?'Hide':'Reveal',onClick:()=>this.toggleReveal(r.id),\n        panel:open?'margin-top:2px;background:var(--tint,#efeaff);border:1px solid var(--tintbd,#d8cdff);border-radius:10px;padding:11px 13px;animation:pop .25s ease':'display:none'};});\n    const reveals={factor:mkRev('factor'),context:mkRev('context')};\n\n    const sorts={terms:this.buildSort('terms')};\n\n    const card=this.vocab[S.fcIndex], known=!!S.fcKnown[card.term];\n    const fc={term:card.term,def:card.def,showTerm:!S.fcFlipped,flipped:S.fcFlipped,\n      index1:S.fcIndex+1,total:this.vocab.length,\n      knownCount:Object.keys(S.fcKnown).filter(x=>S.fcKnown[x]).length,\n      onFlip:()=>this.fcFlip(),onPrev:()=>this.fcGo(-1),onNext:()=>this.fcGo(1),onKnow:()=>this.fcKnow(),\n      knowLabel:known?'\\u2713 Known':'Mark as known',\n      knowBg:known?'linear-gradient(135deg,#2fa36b,#1f8a56)':'linear-gradient(135deg,var(--a1,#7c63ff),var(--a2,#4a3fb8))'};\n\n    const letters=['A','B','C','D'];\n    const quizList=this.quizQ.map((q,qi)=>{\n      const sel=S.quizAns[q.id];\n      const choices=q.choices.map((ch,cci)=>{\n        let bg='#fff',bd='#e7e3d8',col='#2c2d44',mark='';\n        if(!S.quizSubmitted){ if(sel===cci){bg='var(--tint,#efeaff)';bd='var(--a1,#7c63ff)';} }\n        else { if(cci===q.answer){bg='#e7f6ee';bd='#2fa36b';mark='\\u2713';} else if(sel===cci){bg='#fdecea';bd='#e0574a';mark='\\u2717';} }\n        return {text:ch,letter:letters[cci],mark,onClick:()=>this.selectAns(q.id,cci),\n          style:\"display:flex;align-items:center;gap:10px;text-align:left;font-family:'Lexend',sans-serif;font-size:14.5px;color:\"+col+\";background:\"+bg+\";border:1.5px solid \"+bd+\";border-radius:10px;padding:11px 15px;cursor:pointer;transition:all .15s ease;width:100%\"};\n      });\n      return {num:qi+1,q:q.q,choices};\n    });\n    let score=0; for(const q of this.quizQ){ if(S.quizAns[q.id]===q.answer) score++; }\n    const pass=this.props.passingScore ?? 5; const passed=score>=pass;\n    const quiz={list:quizList,total:this.quizQ.length,pass,onSubmit:()=>this.submitQuiz(),onRetry:()=>this.retryQuiz(),\n      submitted:S.quizSubmitted,notSubmitted:!S.quizSubmitted,score,\n      resultEmoji:passed?'\\uD83C\\uDF89':'\\uD83D\\uDCD8',resultColor:passed?'#1f8a56':'#c47a1f',\n      resultBg:passed?'linear-gradient(135deg,#e7f6ee,#f1fbf5)':'linear-gradient(135deg,#fff4e8,#fff9f1)',\n      resultBorder:passed?'#bfe6cf':'#f3d9b8',\n      resultMsg:passed?'Excellent! You can simplify, expand, factor, and recognize equivalent expressions.':'Good effort! Review the highlighted answers above, then tap Try Again.'};\n\n    return {themeVars,combine,expand,equiv,reveals,sorts,fc,quiz,\n      showActivities:this.props.showActivities ?? true, showRecap:this.props.showRecap ?? true};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
